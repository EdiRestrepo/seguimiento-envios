@if (open()) {
  <div class="mobile-nav" role="presentation">
    <button class="mobile-nav__backdrop" type="button" aria-label="Cerrar navegación" (click)="closeNavigation()"></button>

    <aside class="mobile-nav__panel" aria-label="Navegación principal móvil">
      <header class="mobile-nav__header">
        <a class="mobile-nav__brand" routerLink="/dashboard" (click)="closeNavigation()" aria-label="Ir al inicio de Conexion360">
          <img src="/assets/logo.png" alt="" aria-hidden="true" />
          <span>
            <strong>Conexion360</strong>
            <small>Visibilidad total. Decisiones inteligentes.</small>
          </span>
        </a>

        <button mat-icon-button type="button" aria-label="Cerrar navegación" (click)="closeNavigation()">
          <mat-icon aria-hidden="true">close</mat-icon>
        </button>
      </header>

      <nav class="mobile-nav__links">
        @for (item of navItems; track item.route) {
          <a
            class="mobile-nav__link"
            [routerLink]="item.route"
            routerLinkActive="mobile-nav__link--active"
            [routerLinkActiveOptions]="{ exact: item.exact }"
            (click)="closeNavigation()"
          >
            <mat-icon aria-hidden="true">{{ item.icon }}</mat-icon>
            <span>{{ item.label }}</span>
          </a>
        }
      </nav>

      <footer class="mobile-nav__user">
        <app-user-menu [session]="session()" (logout)="onLogout()" />
      </footer>
    </aside>
  </div>
}
