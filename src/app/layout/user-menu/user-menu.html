<section class="user-menu" [class.user-menu--compact]="compact()" aria-label="Perfil de usuario">
  <div class="user-menu__identity">
    @if (picture()) {
      <img class="user-menu__avatar" [src]="picture() ?? ''" alt="" aria-hidden="true" />
    } @else {
      <span class="user-menu__avatar" aria-hidden="true">{{ initials() }}</span>
    }

    <span class="user-menu__text">
      <strong [title]="displayName()">{{ displayName() }}</strong>
      <small [title]="email()">{{ email() }}</small>
      <small>{{ roleLabel() }}</small>
    </span>
  </div>

  <button
    mat-stroked-button
    class="user-menu__logout"
    type="button"
    aria-label="Cerrar sesión"
    (click)="onLogout()"
  >
    <mat-icon aria-hidden="true">logout</mat-icon>
    <span>Cerrar sesión</span>
  </button>
</section>
