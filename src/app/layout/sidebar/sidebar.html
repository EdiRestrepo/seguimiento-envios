<aside class="sidebar" aria-label="Navegación principal">
  <a class="sidebar__brand" routerLink="/dashboard" aria-label="Ir al inicio de Conexion360">
    <img class="sidebar__brand-logo" src="/assets/logo.png" alt="" aria-hidden="true" />
    <span>
      <strong>Conexion360</strong>
      <small>Visibilidad total. Decisiones inteligentes.</small>
    </span>
  </a>

  <nav class="sidebar__nav">
    @for (item of navItems; track item.route) {
      <a
        class="sidebar__link"
        [routerLink]="item.route"
        routerLinkActive="sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: item.exact }"
      >
        <mat-icon aria-hidden="true">{{ item.icon }}</mat-icon>
        {{ item.label }}
      </a>
    }
  </nav>

  <div class="sidebar__user">
    <app-user-menu [session]="session()" (logout)="onLogout()" />
  </div>
</aside>
