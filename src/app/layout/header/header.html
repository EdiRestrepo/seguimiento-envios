<header class="header">
  <button mat-icon-button class="header__menu-button" type="button" aria-label="Abrir navegación" (click)="toggleMenu()">
    <mat-icon aria-hidden="true">menu</mat-icon>
  </button>

  <div class="header__title">
    <p class="header__eyebrow">Plataforma logística</p>
    <strong>Conexion360</strong>
    @if (loading()) {
      <small>Cargando usuario...</small>
    } @else if (hasError()) {
      <small>No fue posible recuperar el perfil.</small>
    } @else if (!session()) {
      <small>Perfil incompleto</small>
    }
  </div>

  <div class="header__actions">
    <app-user-menu [session]="session()" [compact]="true" (logout)="onLogout()" />
  </div>
</header>
